# ============================================================
# Xporadia Backend — Pipeline CI
# Déclenché sur chaque PR vers develop et main
# ============================================================
name: CI — Backend

on:
  push:
    branches: [develop, main, "feature/**", "fix/**"]
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.dev

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Black (format check)
        run: black --check apps/ config/

      - name: isort (import order)
        run: isort --check-only apps/ config/

      - name: Flake8 (lint)
        run: flake8 apps/

      - name: Bandit (security)
        run: bandit -r apps/ -c pyproject.toml --severity-level medium

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run tests
        run: pytest --cov=apps --cov-report=xml --cov-fail-under=80
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: ci-test-secret-key

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  django-check:
    name: Django system check
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Django check
        run: python manage.py check --deploy
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: ci-test-secret-key
