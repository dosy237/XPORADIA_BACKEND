version: "3.9"

# ============================================================
# Xporadia — Docker Compose développement local
# Usage : docker compose up
# ============================================================

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xporadia_db
      POSTGRES_USER: xporadia_user
      POSTGRES_PASSWORD: epsilon_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xporadia_user -d xporadia_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://xporadia_user:epsilon_pass@db:5432/xporadia_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://xporadia_user:epsilon_pass@db:5432/xporadia_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - api
      - redis
    command: celery -A config worker --loglevel=info

  celery_beat:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://xporadia_user:epsilon_pass@db:5432/xporadia_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery_worker
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  postgres_data:
